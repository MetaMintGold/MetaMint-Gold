<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMint | Master Admin Control</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ef4444; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border-bottom: 3px solid var(--primary); border-radius: 15px; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #334155; }
        .search-box input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        .section-title { color: var(--primary); font-size: 0.9rem; font-weight: bold; text-transform: uppercase; margin: 25px 0 15px 5px; display: flex; align-items: center; gap: 10px; }
        .data-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .txid-text { font-size: 0.65rem; color: #38bdf8; word-break: break-all; margin-top: 5px; display: block; background: #0f172a; padding: 5px; border-radius: 4px; }
        .timestamp-text { font-size: 0.65rem; color: #a855f7; display: block; margin-top: 4px; font-weight: bold; }
        .btn-manage { background: #38bdf8; color: #0f172a; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .wa-link { color: #22c55e; text-decoration: none; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-top: 4px; }
        
        /* Loading Spinner */
        .loading-text { color: #64748b; font-size: 0.85rem; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .spinner { animation: spin 1s linear infinite; color: var(--primary); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modals and History List Expansion */
        .swal-label { display: block; text-align: left; color: #fbbf24; font-size: 0.75rem; margin-top: 14px; margin-left: 5%; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .swal-input-custom { background: #0f172a !important; color: white !important; width: 90% !important; padding: 12px !important; border-radius: 10px !important; border: 1px solid #334155 !important; margin-bottom: 4px !important; font-size: 0.95rem !important; }
        .team-counter-box { background: #0f172a; padding: 14px; border-radius: 10px; width: 90%; margin: 20px auto 5px auto; border: 1px solid #334155; text-align: left; }
        .team-counter-title { font-size: 0.8rem; color: #38bdf8; font-weight: bold; margin-bottom: 6px; display: block; text-transform: uppercase;}
        
        .history-embed-container { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 90%; margin: 15px auto; text-align: left; max-height: 200px; overflow-y: auto; }
        .history-row-item { font-size: 0.75rem; padding: 8px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .badge-status { padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        .btn-delete-user { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 90%; margin: 10px auto; display: block; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        
        /* Premium Copy Button Style */
        .btn-copy-addr { background: #0284c7; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; margin-top: 5px; }
        .btn-copy-addr:active { background: #0369a1; }
    </style>
</head>
<body>
    <header class="header">
        <div><h2 style="margin:0;"><i class="fas fa-user-shield"></i> MASTER CONTROL</h2></div>
        <div id="adminMail" style="font-size: 0.7rem; color: #94a3b8;">Loading Admin Node...</div>
    </header>

    <div class="search-box">
        <input type="number" id="searchUID" placeholder="Enter User 4-Digit UID">
        <button onclick="window.searchUser()" style="background:var(--primary); border:none; color:white; padding:10px 18px; border-radius:8px;"><i class="fas fa-search"></i></button>
    </div>

    <div class="section-title"><i class="fas fa-wallet"></i> Pending Deposits</div>
    <div id="depositList"><div class="loading-text"><i class="fas fa-spinner spinner"></i> Connecting deposit stream...</div></div>

    <div class="section-title"><i class="fas fa-hand-holding-usd"></i> Pending Withdrawals</div>
    <div id="withdrawList"><div class="loading-text"><i class="fas fa-spinner spinner"></i> Connecting withdrawal stream...</div></div>

    <div class="section-title"><i class="fas fa-users"></i> All Users</div>
    <div id="userList"><div class="loading-text"><i class="fas fa-spinner spinner"></i> Fetching active nodes...</div></div>

    <div class="section-title"><i class="fas fa-history"></i> Global Administrative Records (All History)</div>
    <div id="globalHistoryLog" style="background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 10px; max-height: 350px; overflow-y: auto;">
        <p style="padding:10px; color:#64748b; font-size: 0.85rem;">No historical database updates found.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, get, remove, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDea-7DWbKSc7QCbp2aP4OJuMiMvqnJxRA",
            authDomain: "metamint-127ee.firebaseapp.com",
            databaseURL: "https://metamint-127ee-default-rtdb.firebaseio.com",
            projectId: "metamint-127ee",
            storageBucket: "metamint-127ee.firebasestorage.app",
            messagingSenderId: "756801996954",
            appId: "1:756801996954:web:bcb7a18a57daacd3c6b723"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let usersCache = {};
        let firstLoadComplete = false;

        // ADVANCED TIMESTAMP CONVERTER
        function parseAndFormatTime(rawInput) {
            if (!rawInput) {
                const current = new Date();
                return current.toLocaleString('en-US', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
            }
            if (!isNaN(rawInput)) {
                const parsedNum = parseInt(rawInput);
                const dateObj = new Date(parsedNum);
                if (dateObj.getTime() > 0) {
                    return dateObj.toLocaleString('en-US', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
                }
            }
            return rawInput;
        }

        // Copy Clipboard Control
        window.copyAddressToClipboard = (textToCopy) => {
            navigator.clipboard.writeText(textToCopy).then(() => {
                Swal.mixin({
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 1500,
                    background: '#1e293b',
                    color: '#fff'
                }).fire({ icon: 'success', title: 'Address Copied!' });
            }).catch(() => {
                Swal.fire('Error', 'Clipboard copy failed', 'error');
            });
        };

        // Local Push Notification permission request
        if (typeof window !== "undefined" && "Notification" in window) {
            if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        function triggerLocalPushNotification(title, message) {
            if (typeof window !== "undefined" && "Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: message, icon: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" });
            }
        }

        // Strong Dynamic Verification Check
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "dreamsagweb@gmail.com") {
                document.body.style.display = "block";
                document.getElementById('adminMail').innerText = user.email;
                
                // CRITICAL FIX: Direct Dynamic listener so new users appear instantly!
                onValue(ref(db, 'users'), usersSnap => {
                    usersCache = {};
                    usersSnap.forEach(child => {
                        usersCache[child.key] = child.val();
                    });
                    loadLists();
                    loadGlobalHistory();
                });

                // Listeners for pending alerts
                onValue(ref(db, 'depositRequests'), snap => {
                    if (firstLoadComplete && snap.exists()) {
                        triggerLocalPushNotification("DreamSag Alert", "New Pending Deposit Request Received!");
                    }
                });

                onValue(ref(db, 'withdrawRequests'), snap => {
                    if (firstLoadComplete && snap.exists()) {
                        triggerLocalPushNotification("DreamSag Alert", "New Pending Withdrawal Request Received!");
                    }
                    firstLoadComplete = true;
                });

            } else { window.location.href = 'dashboard.html'; }
        });

        // REVOLUTIONARY FIX: Resolved Long UID parsing to match internal short UIDs accurately
        function getUserDisplayInfo(rawUID) {
            if (!rawUID) return { name: "Blank Node", shortUID: "####" };
            
            // Check direct match
            if (usersCache[rawUID]) {
                return { name: usersCache[rawUID].username || "User", shortUID: usersCache[rawUID].uid || "####" };
            }
            
            // Loop internal keys to match if rawUID is long firebase Auth key
            for (let k in usersCache) {
                if (String(usersCache[k].uid) === String(rawUID) || k === String(rawUID)) {
                    return { name: usersCache[k].username || "User", shortUID: usersCache[k].uid || "####" };
                }
            }
            
            // If cache isn't fully loaded yet prevent "Unknown User"
            if (Object.keys(usersCache).length === 0) {
                return { name: "Loading Profile...", shortUID: "..." };
            }
            
            return { name: "User (Not Found)", shortUID: String(rawUID).substring(0, 6) + "..." };
        }

        function loadLists() {
            // 1. Pending Deposits Monitor Loop
            get(ref(db, 'depositRequests')).then(snap => {
                const div = document.getElementById('depositList');
                div.innerHTML = '';
                if(!snap.exists()) { div.innerHTML = '<p style="padding:10px; color:#64748b; font-size:0.85rem;">No pending deposits found.</p>'; return; }
                snap.forEach(child => {
                    const d = child.val();
                    const trxKey = d.id || child.key; 
                    const userInfo = getUserDisplayInfo(d.uid);
                    const timeStamp = parseAndFormatTime(d.dateTime || d.date || d.timestamp);

                    div.innerHTML += `<div class="data-card"><div style="width:70%;"><b>$${d.amount}</b><br><small>${userInfo.name} (UID: ${userInfo.shortUID})</small><span class="timestamp-text"><i class="far fa-clock"></i> ${timeStamp}</span><span class="txid-text">TXID: ${d.txid}</span></div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="window.approveDeposit('${child.key}', '${d.uid}', ${d.amount}, '${trxKey}', '${timeStamp}')" style="background:#22c55e; border:none; padding:10px; border-radius:5px; color:white; cursor:pointer;"><i class="fas fa-check"></i></button>
                        <button onclick="window.rejectDeposit('${child.key}', '${d.uid}', '${trxKey}', '${timeStamp}')" style="background:#ef4444; border:none; padding:10px; border-radius:5px; color:white; cursor:pointer;"><i class="fas fa-times"></i></button>
                    </div></div>`;
                });
            });

            // 2. Pending Withdrawals Monitor Loop
            get(ref(db, 'withdrawRequests')).then(snap => {
                const div = document.getElementById('withdrawList');
                div.innerHTML = '';
                if(!snap.exists()) { div.innerHTML = '<p style="padding:10px; color:#64748b; font-size:0.85rem;">No pending withdrawals found.</p>'; return; }
                snap.forEach(child => {
                    const w = child.val();
                    const userInfo = getUserDisplayInfo(w.uid);
                    const timeStamp = parseAndFormatTime(w.dateTime || w.date || w.timestamp);
                    const rawAddress = w.address || "No Address Provided";

                    div.innerHTML += `<div class="data-card"><div style="width:70%;"><b>$${w.amount}</b><br><small>${userInfo.name} (UID: ${userInfo.shortUID})</small><span class="timestamp-text"><i class="far fa-clock"></i> ${timeStamp}</span><span class="txid-text">Addr: ${rawAddress}</span>
                    <button class="btn-copy-addr" onclick="window.copyAddressToClipboard(\`${rawAddress.replace(/`/g, '\\`').replace(/\n/g, ' ')}\`)" type="button"><i class="far fa-copy"></i> Copy Details</button>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="window.processWithdraw('${child.key}', '${w.uid}', ${w.amount}, 'approved', '${child.key}', '${timeStamp}')" style="background:#22c55e; border:none; padding:10px; border-radius:5px; color:white; cursor:pointer;"><i class="fas fa-check"></i></button>
                        <button onclick="window.processWithdraw('${child.key}', '${w.uid}', ${w.amount}, 'rejected', '${child.key}', '${timeStamp}')" style="background:#ef4444; border:none; padding:10px; border-radius:5px; color:white; cursor:pointer;"><i class="fas fa-times"></i></button>
                    </div></div>`;
                });
            });

            // 3. Render All Users Layout Core
            const list = document.getElementById('userList');
            list.innerHTML = '';
            
            const usersKeys = Object.keys(usersCache);
            if(usersKeys.length === 0) {
                list.innerHTML = '<p style="padding:10px; color:#64748b; font-size:0.85rem;">No active user records registered.</p>';
                return;
            }

            usersKeys.forEach(key => {
                const u = usersCache[key];
                if(!u.username) return; // Skip broken schemas
                const blockIcon = u.isBlocked ? '<i class="fas fa-user-slash" style="color:#ef4444; margin-right:5px;"></i>' : '';
                const statusIcon = u.miningStatus === 'active' ? '<i class="fas fa-circle" style="color:#22c55e; font-size:0.6rem; margin-right:5px;"></i>' : '<i class="fas fa-circle" style="color:#64748b; font-size:0.6rem; margin-right:5px;"></i>';
                const userWA = u.whatsapp || "No Number";
                const waLink = u.whatsapp ? `https://wa.me/${u.whatsapp}` : "#";
                
                list.innerHTML += `<div class="data-card"><div style="width:65%;"><b>${statusIcon}${blockIcon}${u.username}</b><br><small>UID: ${u.uid || '####'}</small><br><a href="${waLink}" target="_blank" class="wa-link"><i class="fab fa-whatsapp"></i> ${userWA}</a></div><button onclick="window.openManager('${key}')" class="btn-manage" type="button">Manage</button></div>`;
            });
        }

        function loadGlobalHistory() {
            get(ref(db, 'globalAdminLogs')).then(snap => {
                const historyBox = document.getElementById('globalHistoryLog');
                historyBox.innerHTML = '';
                if (!snap.exists()) {
                    historyBox.innerHTML = '<p style="padding:10px; color:#64748b; font-size: 0.85rem;">No historical records saved yet.</p>';
                    return;
                }
                let htmlContent = "";
                snap.forEach(child => {
                    const log = child.val();
                    const color = (log.type === 'DEPOSIT' || log.type === 'SPECIAL GIFT') ? '#22c55e' : '#ef4444';
                    htmlContent = `
                        <div style="font-size:0.75rem; padding:10px; border-bottom:1px solid #334155; display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <b style="color:${color};">[${log.type}]</b> <b>${log.username || 'User'} (UID: ${log.shortUID || '####'})</b> - <b>$${log.amount}</b>
                                <br><small style="color:#94a3b8;">Status: ${String(log.status).toUpperCase()}</small>
                            </div>
                            <div style="text-align:right; color:#a855f7; font-weight:bold;">${parseAndFormatTime(log.time)}</div>
                        </div>
                    ` + htmlContent;
                });
                historyBox.innerHTML = htmlContent;
            });
        }

        window.approveDeposit = async (key, userUID, amount, trxKey, timestamp) => {
            try {
                let userKey = null; let userData = null;
                for(let k in usersCache){ if(String(usersCache[k].uid) === String(userUID) || k === userUID){ userKey = k; userData = usersCache[k]; }}

                if(userKey && userData){
                    const depositAmount = parseFloat(amount);
                    const currentBal = parseFloat(userData.totalBalance || 0);

                    await update(ref(db, `users/${userKey}`), { totalBalance: (currentBal + depositAmount).toFixed(2), miningStatus: 'active' });

                    const uplinerUID = String(userData.referredBy || "").trim().toLowerCase();
                    if (uplinerUID && uplinerUID !== "none") {
                        for(let k in usersCache){
                            const u = usersCache[k];
                            if (String(u.referralCode || "").trim().toLowerCase() === uplinerUID || String(u.uid || "").trim().toLowerCase() === uplinerUID) {
                                const commission = depositAmount * 0.10;
                                await update(ref(db, `users/${k}`), { referralWallet: (parseFloat(u.referralWallet || 0) + commission).toFixed(2) });
                            }
                        }
                    }

                    if(trxKey) { await update(ref(db, `transactions/${userKey}/${trxKey}`), { status: 'SUCCESS' }); }
                    
                    const logRef = push(ref(db, 'globalAdminLogs'));
                    await set(logRef, { type: 'DEPOSIT', username: userData.username, shortUID: userData.uid, amount: depositAmount, status: 'approved', time: timestamp });

                    await remove(ref(db, `depositRequests/${key}`));
                    Swal.fire({ title: 'Approved!', text: 'Deposit verified successfully.', icon: 'success', background: '#1e293b', color: '#fff' });
                } else { Swal.fire('Error', 'User record lookup failed!', 'error'); }
            } catch (error) { Swal.fire('Error', 'Technical fault operational crash', 'error'); }
        };

        window.rejectDeposit = async (key, uid, trxKey, timestamp) => {
            let userKey = uid; let userData = { username: "User", uid: "####" };
            for(let k in usersCache){ if(String(usersCache[k].uid) === String(uid) || k === uid) { userKey = k; userData = usersCache[k]; } }
            if(trxKey && userKey) { await update(ref(db, `transactions/${userKey}/${trxKey}`), { status: 'REJECTED' }); }
            
            const logRef = push(ref(db, 'globalAdminLogs'));
            await set(logRef, { type: 'DEPOSIT', username: userData.username, shortUID: userData.uid, amount: '0', status: 'rejected', time: timestamp });

            await remove(ref(db, `depositRequests/${key}`));
            Swal.fire('Rejected', 'History log saved as negative.', 'error');
        };

        window.processWithdraw = async (key, userUID, amount, status, trxKey, timestamp) => {
            let userKey = null;
            for(let k in usersCache){ if(String(usersCache[k].uid) === String(userUID) || k === userUID) userKey = k; }

            if(userKey) {
                const userRef = ref(db, `users/${userKey}`);
                const uData = usersCache[userKey];
                if(status === 'rejected') {
                    const currentWith = parseFloat(uData.withdrawable || 0);
                    await update(userRef, { withdrawable: (currentWith + amount).toFixed(2) });
                }
                if(trxKey) { await update(ref(db, `transactions/${userKey}/${trxKey}`), { status: status.toUpperCase() }); }
                await update(userRef, { 
                    notification: status === 'approved' ? `Your withdrawal of $${amount} has been approved!` : `Withdrawal of $${amount} was rejected.`, 
                    lastNotifSeen: false 
                });

                const logRef = push(ref(db, 'globalAdminLogs'));
                await set(logRef, { type: 'WITHDRAWAL', username: uData.username, shortUID: uData.uid, amount: amount, status: status, time: timestamp });

                await remove(ref(db, `withdrawRequests/${key}`));
                Swal.fire('Done', `Status synced: ${status}`, 'success');
            }
        };

        window.deleteUserAccount = async (userKey, username, shortUID) => {
            const confirm = await Swal.fire({
                title: 'Are you absolutely sure?',
                text: `This will permanently delete ${username} (UID: ${shortUID}) from Firebase. This action cannot be undone!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Yes, Delete It!',
                background: '#1e293b',
                color: '#fff'
            });

            if (confirm.isConfirmed) {
                try {
                    await remove(ref(db, `users/${userKey}`));
                    await remove(ref(db, `transactions/${userKey}`));
                    Swal.fire({ title: 'Deleted!', text: 'User accounts wiped.', icon: 'success', background: '#1e293b', color: '#fff' });
                    setTimeout(() => { location.reload(); }, 1200);
                } catch (err) {
                    Swal.fire('Error', 'Failed to delete data nodes.', 'error');
                }
            }
        };

        window.openManager = async (userKey) => {
            const u = usersCache[userKey];
            if(!u) return;
            
            let totalTeamCount = 0; let activeTeamCount = 0; let inactiveTeamCount = 0;
            const myReferralCode = String(u.referralCode || "").trim().toLowerCase();
            const myUID = String(u.uid || "").trim().toLowerCase();

            if(myReferralCode || myUID) {
                for(let k in usersCache){
                    const potentialMember = usersCache[k];
                    const memberReferredBy = String(potentialMember.referredBy || "").trim().toLowerCase();
                    if(memberReferredBy !== "none" && (memberReferredBy === myReferralCode || memberReferredBy === myUID)) {
                        totalTeamCount++;
                        if(potentialMember.miningStatus === 'active') activeTeamCount++; else inactiveTeamCount++;
                    }
                }
            }

            let userHistoryHTML = "";
            const txSnap = await get(ref(db, `transactions/${userKey}`));
            if(txSnap.exists()) {
                txSnap.forEach(c => {
                    const t = c.val();
                    const txAmt = t.amount || "0";
                    const txType = t.type || "Transaction";
                    const txTime = parseAndFormatTime(t.dateTime || t.date || t.timestamp);
                    const txStatus = t.status || "PENDING";
                    const statusColor = (txStatus.toLowerCase() === 'success' || txStatus.toLowerCase() === 'approved') ? '#22c55e' : (txStatus.toLowerCase() === 'rejected' ? '#ef4444' : '#fbbf24');
                    
                    userHistoryHTML = `
                        <div class="history-row-item">
                            <div><b>${txType.toUpperCase()}: $${txAmt}</b><br><small style="color:#64748b;">${txTime}</small></div>
                            <span class="badge-status" style="background: ${statusColor}22; color: ${statusColor}; border: 1px solid ${statusColor}44;">${txStatus}</span>
                        </div>
                    ` + userHistoryHTML;
                });
            }

            if(userHistoryHTML === "") {
                const logsSnap = await get(ref(db, 'globalAdminLogs'));
                if(logsSnap.exists()) {
                    logsSnap.forEach(c => {
                        const l = c.val();
                        if(String(l.shortUID) === String(u.uid)) {
                            const statusColor = l.status === 'approved' || l.status === 'success' ? '#22c55e' : '#ef4444';
                            userHistoryHTML = `
                                <div class="history-row-item">
                                    <div><b>${l.type}: $${l.amount}</b><br><small style="color:#64748b;">${parseAndFormatTime(l.time)}</small></div>
                                    <span class="badge-status" style="background: ${statusColor}22; color: ${statusColor}; border: 1px solid ${statusColor}44;">${l.status}</span>
                                </div>
                            ` + userHistoryHTML;
                        }
                    });
                }
            }

            if(userHistoryHTML === "") { userHistoryHTML = "<p style='color:#64748b; font-size:0.75rem; text-align:center; padding:10px;'>No verified deposit/withdrawal history on record.</p>"; }

            const { value: form } = await Swal.fire({
                title: `Manage: ${u.username} (UID: ${u.uid || '####'})`,
                background: '#1e293b',
                color: '#f8fafc',
                width: '450px',
                html: `
                    <div style="margin-top: 10px; max-height: 480px; overflow-y: auto; padding-right: 5px;">
                        <label class="swal-label">Mining Balance ($)</label>
                        <input id="m-dep" class="swal2-input swal-input-custom" type="number" value="${u.totalBalance || 0}">
                        
                        <label class="swal-label">Withdrawable ($)</label>
                        <input id="m-with" class="swal2-input swal-input-custom" type="number" value="${u.withdrawable || 0}">
                        
                        <label class="swal-label">Ref Wallet ($)</label>
                        <input id="m-ref" class="swal2-input swal-input-custom" type="number" value="${u.referralWallet || 0}">
                        
                        <label class="swal-label" style="color: #22c55e;"><i class="fas fa-gift"></i> Send Direct Gift Reward ($)</label>
                        <input id="m-gift" class="swal2-input swal-input-custom" type="number" placeholder="Enter dollar amount to gift box" value="0">
                        
                        <label class="swal-label">Status (active/inactive)</label>
                        <input id="m-status" class="swal2-input swal-input-custom" value="${u.miningStatus || 'inactive'}">
                        
                        <div style="display:flex; align-items:center; justify-content:space-between; background:#0f172a; padding:12px; border-radius:10px; width:85%; margin:15px auto; border: 1px solid #334155;">
                            <span style="font-size:0.8rem; color:#ef4444; font-weight:bold;"><i class="fas fa-ban"></i> BLOCK ACCOUNT</span>
                            <input type="checkbox" id="m-block" style="width:22px; height:22px; cursor:pointer;" ${u.isBlocked ? 'checked' : ''}>
                        </div>

                        <button type="button" onclick="window.deleteUserAccount('${userKey}', '${u.username}', '${u.uid || '####'}')" class="btn-delete-user"><i class="fas fa-trash-alt"></i> Delete Account Permanently</button>
                        
                        <label class="swal-label">Push Notification Alert Box</label>
                        <input id="m-note" class="swal2-input swal-input-custom" value="${u.notification || ''}">
                        
                        <div class="team-counter-box">
                            <span class="team-counter-title"><i class="fas fa-users"></i> Downline Network Stats</span>
                            <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#cbd5e1; margin-top:4px;">
                                <span>Total: <b>${totalTeamCount}</b></span>
                                <span style="color:#22c55e;">Active: <b>${activeTeamCount}</b></span>
                                <span style="color:#94a3b8;">Inactive: <b>${inactiveTeamCount}</b></span>
                            </div>
                        </div>

                        <div class="swal-label" style="color:#38bdf8; margin-top:20px;"><i class="fas fa-history"></i> User Ledger History</div>
                        <div class="history-embed-container">${userHistoryHTML}</div>
                    </div>
                `,
                confirmButtonText: '<i class="fas fa-save"></i> Save Changes', 
                showCancelButton: true,
                cancelButtonText: 'Cancel',
                customClass: { confirmButton: 'btn-manage' },
                preConfirm: () => ({
                    totalBalance: parseFloat(document.getElementById('m-dep').value || 0),
                    withdrawable: parseFloat(document.getElementById('m-with').value || 0),
                    referralWallet: parseFloat(document.getElementById('m-ref').value || 0),
                    giftReward: parseFloat(document.getElementById('m-gift').value || 0),
                    miningStatus: document.getElementById('m-status').value.toLowerCase(),
                    isBlocked: document.getElementById('m-block').checked,
                    notification: document.getElementById('m-note').value
                })
            });

            if(form) { 
                let updateData = {
                    totalBalance: form.totalBalance.toFixed(2),
                    withdrawable: form.withdrawable.toFixed(2),
                    referralWallet: form.referralWallet.toFixed(2),
                    miningStatus: form.miningStatus,
                    isBlocked: form.isBlocked,
                    notification: form.notification,
                    lastNotifSeen: false
                };

                if (form.giftReward > 0) {
                    updateData.withdrawable = (parseFloat(u.withdrawable || 0) + form.giftReward).toFixed(2);
                    updateData.hasNewReward = true; 
                    
                    const giftLogRef = push(ref(db, 'globalAdminLogs'));
                    await set(giftLogRef, { type: 'SPECIAL GIFT', username: u.username, shortUID: u.uid || '####', amount: form.giftReward, status: 'success', time: parseAndFormatTime() });
                }

                await update(ref(db, `users/${userKey}`), updateData); 
                Swal.fire('Changes Saved!', 'Database nodes synced instantly.', 'success'); 
            }
        };

        window.searchUser = async () => {
            const inputUID = document.getElementById('searchUID').value;
            if(!inputUID) return;
            let foundKey = null;
            for(let k in usersCache){ if(String(usersCache[k].uid) === String(inputUID)) foundKey = k; }
            if(foundKey) window.openManager(foundKey);
            else Swal.fire('Error', '4-Digit User UID data-node missing', 'error');
        };
    </script>
</body>
</html>
