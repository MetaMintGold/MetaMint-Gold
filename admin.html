<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMint | Master Admin Control</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ef4444; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border-bottom: 3px solid var(--primary); border-radius: 15px; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #334155; }
        .search-box input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        .section-title { color: var(--primary); font-size: 0.9rem; font-weight: bold; text-transform: uppercase; margin: 25px 0 15px 5px; display: flex; align-items: center; gap: 10px; }
        .data-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .txid-text { font-size: 0.65rem; color: #38bdf8; word-break: break-all; margin-top: 5px; display: block; background: #0f172a; padding: 5px; border-radius: 4px; }
        .btn-manage { background: #38bdf8; color: #0f172a; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .wa-link { color: #22c55e; text-decoration: none; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-top: 4px; }
        .swal-label { display: block; text-align: left; color: #fbbf24; font-size: 0.75rem; margin-top: 10px; margin-left: 10%; font-weight: bold; }
        .swal-input-custom { background: #0f172a !important; color: white !important; width: 80% !important; padding: 10px !important; border-radius: 8px !important; border: 1px solid #334155 !important; margin-bottom: 5px !important; }
        .team-counter-box { background: #0f172a; padding: 12px; border-radius: 8px; width: 80%; margin: 15px auto 5px auto; border: 1px solid #334155; text-align: left; }
        .team-counter-title { font-size: 0.8rem; color: #38bdf8; font-weight: bold; margin-bottom: 6px; display: block; text-transform: uppercase;}
    </style>
</head>
<body>
    <header class="header">
        <div><h2 style="margin:0;"><i class="fas fa-user-shield"></i> MASTER CONTROL</h2></div>
        <div id="adminMail" style="font-size: 0.7rem; color: #94a3b8;"></div>
    </header>

    <div class="search-box">
        <input type="number" id="searchUID" placeholder="Enter User UID">
        <button onclick="window.searchUser()" style="background:var(--primary); border:none; color:white; padding:10px 18px; border-radius:8px;"><i class="fas fa-search"></i></button>
    </div>

    <div class="section-title"><i class="fas fa-wallet"></i> Pending Deposits</div>
    <div id="depositList"></div>

    <div class="section-title"><i class="fas fa-hand-holding-usd"></i> Pending Withdrawals</div>
    <div id="withdrawList"></div>

    <div class="section-title"><i class="fas fa-users"></i> All Users</div>
    <div id="userList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDea-7DWbKSc7QCbp2aP4OJuMiMvqnJxRA",
            authDomain: "metamint-127ee.firebaseapp.com",
            databaseURL: "https://metamint-127ee-default-rtdb.firebaseio.com",
            projectId: "metamint-127ee",
            storageBucket: "metamint-127ee.firebasestorage.app",
            messagingSenderId: "756801996954",
            appId: "1:756801996954:web:bcb7a18a57daacd3c6b723"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Global variables to map Firebase Auth UID to user object fields
        let usersCache = {};

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "dreamsagweb@gmail.com") {
                document.body.style.display = "block";
                document.getElementById('adminMail').innerText = user.email;
                
                // Real-time listener to cache users first, then render sections
                onValue(ref(db, 'users'), usersSnap => {
                    usersCache = {};
                    usersSnap.forEach(child => {
                        usersCache[child.key] = child.val();
                    });
                    loadLists();
                });

            } else { window.location.href = 'dashboard.html'; }
        });

        // Helper function to extract username and short custom UID from firebase key/uid
        function getUserDisplayInfo(rawUID) {
            // Check if rawUID directly matches cache key
            if (usersCache[rawUID]) {
                return {
                    name: usersCache[rawUID].username || "User",
                    shortUID: usersCache[rawUID].uid || "####"
                };
            }
            // Fallback: search inside objects if rawUID was submitted as the short custom UID
            for (let k in usersCache) {
                if (String(usersCache[k].uid) === String(rawUID)) {
                    return {
                        name: usersCache[k].username || "User",
                        shortUID: usersCache[k].uid || "####"
                    };
                }
            }
            return { name: "Unknown User", shortUID: rawUID };
        }

        function loadLists() {
            // 1. Pending Deposits Showcase
            get(ref(db, 'depositRequests')).then(snap => {
                const div = document.getElementById('depositList');
                div.innerHTML = '';
                if(!snap.exists()) { div.innerHTML = '<p style="padding:10px; color:#64748b;">No pending deposits</p>'; return; }
                snap.forEach(child => {
                    const d = child.val();
                    const trxKey = d.id || child.key; 
                    const userInfo = getUserDisplayInfo(d.uid);

                    div.innerHTML += `<div class="data-card"><div style="width:70%;"><b>$${d.amount}</b><br><small>${userInfo.name} (UID: ${userInfo.shortUID})</small><span class="txid-text">TXID: ${d.txid}</span></div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="window.approveDeposit('${child.key}', '${d.uid}', ${d.amount}, '${trxKey}')" style="background:#22c55e; border:none; padding:10px; border-radius:5px; color:white;"><i class="fas fa-check"></i></button>
                        <button onclick="window.rejectDeposit('${child.key}', '${d.uid}', '${trxKey}')" style="background:#ef4444; border:none; padding:10px; border-radius:5px; color:white;"><i class="fas fa-times"></i></button>
                    </div></div>`;
                });
            });

            // 2. Pending Withdrawals Showcase
            get(ref(db, 'withdrawRequests')).then(snap => {
                const div = document.getElementById('withdrawList');
                div.innerHTML = '';
                if(!snap.exists()) { div.innerHTML = '<p style="padding:10px; color:#64748b;">No pending withdrawals</p>'; return; }
                snap.forEach(child => {
                    const w = child.val();
                    const userInfo = getUserDisplayInfo(w.uid);

                    div.innerHTML += `<div class="data-card"><div style="width:70%;"><b>$${w.amount}</b><br><small>${userInfo.name} (UID: ${userInfo.shortUID})</small><span class="txid-text">Addr: ${w.address}</span></div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="window.processWithdraw('${child.key}', '${w.uid}', ${w.amount}, 'approved', '${child.key}')" style="background:#22c55e; border:none; padding:10px; border-radius:5px; color:white;"><i class="fas fa-check"></i></button>
                        <button onclick="window.processWithdraw('${child.key}', '${w.uid}', ${w.amount}, 'rejected', '${child.key}')" style="background:#ef4444; border:none; padding:10px; border-radius:5px; color:white;"><i class="fas fa-times"></i></button>
                    </div></div>`;
                });
            });

            // 3. Render All Users Node
            const list = document.getElementById('userList');
            list.innerHTML = '';
            for (let key in usersCache) {
                const u = usersCache[key];
                const blockIcon = u.isBlocked ? '<i class="fas fa-user-slash" style="color:#ef4444; margin-right:5px;"></i>' : '';
                const statusIcon = u.miningStatus === 'active' ? '<i class="fas fa-circle" style="color:#22c55e; font-size:0.6rem; margin-right:5px;"></i>' : '<i class="fas fa-circle" style="color:#64748b; font-size:0.6rem; margin-right:5px;"></i>';
                const userWA = u.whatsapp || "No Number";
                const waLink = u.whatsapp ? `https://wa.me/${u.whatsapp}` : "#";
                
                list.innerHTML += `<div class="data-card"><div style="width:65%;"><b>${statusIcon}${blockIcon}${u.username}</b><br><small>UID: ${u.uid}</small><br><a href="${waLink}" target="_blank" class="wa-link"><i class="fab fa-whatsapp"></i> ${userWA}</a></div><button onclick="window.openManager('${key}')" class="btn-manage">Manage</button></div>`;
            }
        }

        // --- FIXED DEPOSIT & COMMISSION LOGIC ---
        window.approveDeposit = async (key, userUID, amount, trxKey) => {
            try {
                let userKey = null;
                let userData = null;
                
                for(let k in usersCache){
                    if(String(usersCache[k].uid) === String(userUID) || k === userUID){
                        userKey = k;
                        userData = usersCache[k];
                    }
                }

                if(userKey && userData){
                    const depositAmount = parseFloat(amount);
                    const currentBal = parseFloat(userData.totalBalance || 0);

                    await update(ref(db, `users/${userKey}`), { 
                        totalBalance: (currentBal + depositAmount).toFixed(2),
                        miningStatus: 'active' 
                    });

                    // 10% UPLINER COMMISSION LOGIC FOR METAMINT
                    const uplinerUID = String(userData.referredBy || "").trim().toLowerCase();
                    
                    if (uplinerUID && uplinerUID !== "none") {
                        for(let k in usersCache){
                            const u = usersCache[k];
                            const uCode = String(u.referralCode || "").trim().toLowerCase();
                            const uID = String(u.uid || "").trim().toLowerCase();

                            if (uCode === uplinerUID || uID === uplinerUID) {
                                const commission = depositAmount * 0.10;
                                const currentRefWallet = parseFloat(u.referralWallet || 0);
                                
                                await update(ref(db, `users/${k}`), { 
                                    referralWallet: (currentRefWallet + commission).toFixed(2) 
                                });
                            }
                        }
                    }

                    if(trxKey) { 
                        await update(ref(db, `transactions/${userKey}/${trxKey}`), { status: 'SUCCESS' }); 
                    }
                    await remove(ref(db, `depositRequests/${key}`));
                    
                    Swal.fire({ 
                        title: 'Approved!', 
                        text: `Deposit added. 10% Commission sent to upliner (${uplinerUID})`, 
                        icon: 'success', 
                        background: '#1e293b', 
                        color: '#fff' 
                    });
                } else { Swal.fire('Error', 'User not found!', 'error'); }
            } catch (error) { 
                console.error(error);
                Swal.fire('Error', 'Technical fault', 'error'); 
            }
        };

        window.rejectDeposit = async (key, uid, trxKey) => {
            let userKey = uid;
            for(let k in usersCache){ if(String(usersCache[k].uid) === String(uid)) userKey = k; }
            if(trxKey) { await update(ref(db, `transactions/${userKey}/${trxKey}`), { status: 'REJECTED' }); }
            await remove(ref(db, `depositRequests/${key}`));
            Swal.fire('Rejected', 'History updated', 'error');
        };

        window.processWithdraw = async (key, userUID, amount, status, trxKey) => {
            let userKey = null;
            for(let k in usersCache){ if(String(usersCache[k].uid) === String(userUID) || k === userUID) userKey = k; }

            if(userKey) {
                const userRef = ref(db, `users/${userKey}`);
                if(status === 'rejected') {
                    const currentWith = parseFloat(usersCache[userKey].withdrawable || 0);
                    await update(userRef, { withdrawable: (currentWith + amount).toFixed(2) });
                }
                if(trxKey) { await update(ref(db, `transactions/${userKey}/${trxKey}`), { status: status.toUpperCase() }); }
                await update(userRef, { 
                    notification: status === 'approved' ? `Your withdrawal of $${amount} has been approved!` : `Withdrawal of $${amount} was rejected.`, 
                    lastNotifSeen: false 
                });
                await remove(ref(db, `withdrawRequests/${key}`));
                Swal.fire('Done', `Status: ${status}`, 'success');
            }
        };

        window.openManager = async (userKey) => {
            const u = usersCache[userKey];
            
            // --- LIVE TEAM COUNTER LOGIC (Active vs Inactive) ---
            let totalTeamCount = 0;
            let activeTeamCount = 0;
            let inactiveTeamCount = 0;
            
            const myReferralCode = String(u.referralCode || "").trim().toLowerCase();
            const myUID = String(u.uid || "").trim().toLowerCase();

            if(myReferralCode || myUID) {
                for(let k in usersCache){
                    const potentialMember = usersCache[k];
                    const memberReferredBy = String(potentialMember.referredBy || "").trim().toLowerCase();
                    
                    if(memberReferredBy !== "none" && (memberReferredBy === myReferralCode || memberReferredBy === myUID)) {
                        totalTeamCount++;
                        if(potentialMember.miningStatus === 'active') {
                            activeTeamCount++;
                        } else {
                            inactiveTeamCount++;
                        }
                    }
                }
            }

            const { value: form } = await Swal.fire({
                title: `Manage: ${u.username}`,
                background: '#1e293b',
                color: '#f8fafc',
                html: `<label class="swal-label">Mining Balance ($)</label><input id="m-dep" class="swal2-input swal-input-custom" type="number" value="${u.totalBalance || 0}">
                    <label class="swal-label">Withdrawable ($)</label><input id="m-with" class="swal2-input swal-input-custom" type="number" value="${u.withdrawable || 0}">
                    <label class="swal-label">Ref Wallet ($)</label><input id="m-ref" class="swal2-input swal-input-custom" type="number" value="${u.referralWallet || 0}">
                    
                    <label class="swal-label" style="color: #22c55e;"><i class="fas fa-gift"></i> Send Direct Gift Reward ($)</label>
                    <input id="m-gift" class="swal2-input swal-input-custom" type="number" placeholder="Enter dollar amount to gift box" value="0">
                    
                    <label class="swal-label">Status (active/inactive)</label><input id="m-status" class="swal2-input swal-input-custom" value="${u.miningStatus || 'inactive'}">
                    <div style="display:flex; align-items:center; justify-content:space-between; background:#0f172a; padding:10px; border-radius:8px; margin:15px 10%;"><span style="font-size:0.8rem; color:#ef4444; font-weight:bold;"><i class="fas fa-ban"></i> BLOCK ACCOUNT</span><input type="checkbox" id="m-block" style="width:20px; height:20px;" ${u.isBlocked ? 'checked' : ''}></div>
                    <label class="swal-label">Push Notification</label><input id="m-note" class="swal2-input swal-input-custom" value="${u.notification || ''}">
                    
                    <div class="team-counter-box">
                        <span class="team-counter-title"><i class="fas fa-users"></i> Team Statistics</span>
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#cbd5e1;">
                            <span>Total Joins: <b>${totalTeamCount}</b></span>
                            <span style="color:#22c55e;">Active: <b>${activeTeamCount}</b></span>
                            <span style="color:#94a3b8;">Inactive: <b>${inactiveTeamCount}</b></span>
                        </div>
                    </div>`,
                confirmButtonText: 'Save Changes', showCancelButton: true,
                preConfirm: () => ({
                    totalBalance: parseFloat(document.getElementById('m-dep').value),
                    withdrawable: parseFloat(document.getElementById('m-with').value),
                    referralWallet: parseFloat(document.getElementById('m-ref').value),
                    giftReward: parseFloat(document.getElementById('m-gift').value || 0),
                    miningStatus: document.getElementById('m-status').value.toLowerCase(),
                    isBlocked: document.getElementById('m-block').checked,
                    notification: document.getElementById('m-note').value
                })
            });

            if(form) { 
                let updateData = {
                    totalBalance: form.totalBalance.toFixed(2),
                    withdrawable: form.withdrawable.toFixed(2),
                    referralWallet: form.referralWallet.toFixed(2),
                    miningStatus: form.miningStatus,
                    isBlocked: form.isBlocked,
                    notification: form.notification,
                    lastNotifSeen: false
                };

                if (form.giftReward > 0) {
                    const currentWithBal = parseFloat(u.withdrawable || 0);
                    updateData.withdrawable = (currentWithBal + form.giftReward).toFixed(2);
                    updateData.hasNewReward = true; 
                }

                await update(ref(db, `users/${userKey}`), updateData); 
                Swal.fire('Updated!', 'All changes and rewards saved successfully.', 'success'); 
            }
        };

        window.searchUser = async () => {
            const inputUID = document.getElementById('searchUID').value;
            if(!inputUID) return;
            let foundKey = null;
            for(let k in usersCache){ if(String(usersCache[k].uid) === String(inputUID)) foundKey = k; }
            if(foundKey) window.openManager(foundKey);
            else Swal.fire('Error', 'User UID not found', 'error');
        };
    </script>
</body>
</html>
