<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MetaMint | Login & Register</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#38bdf8">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/7075/7075311.png">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #0f172a; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            touch-action: manipulation; 
        }
        
        /* Install App Banner Style */
        #installBanner {
            display: none; 
            width: 90%;
            max-width: 400px;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown { 
            from { transform: translateY(-20px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        .auth-container { 
            width: 90%; 
            max-width: 400px; 
            background: #1e293b; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
        }

        .tab-group { margin-bottom: 25px; border-bottom: 1px solid #334155; }
        .tab-btn { 
            background: none; 
            border: none; 
            color: #64748b; 
            font-size: 1rem; 
            cursor: pointer; 
            padding: 10px 20px; 
            transition: 0.3s; 
            font-weight: bold; 
        }
        .tab-btn.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; }
        
        .input-group { position: relative; width: 100%; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            outline: none; 
            box-sizing: border-box; 
            font-size: 16px; /* Prevents auto-zoom on mobile */
        }
        
        .toggle-pass { 
            position: absolute; 
            right: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            cursor: pointer; 
            color: #64748b; 
        }

        .main-btn { 
            width: 100%; 
            padding: 15px; 
            background: #38bdf8; 
            border: none; 
            border-radius: 10px; 
            color: #0f172a; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            font-size: 1rem; 
        }

        .forgot-link { 
            display: block; 
            margin-top: 15px; 
            color: #38bdf8; 
            font-size: 0.85rem; 
            text-decoration: none; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="installBanner">
        <i class="fas fa-cloud-download-alt"></i> INSTALL METAMINT OFFICIAL APP
    </div>

    <div class="auth-container">
        <h1>Meta<span style="color: #38bdf8;">Mint</span></h1>
        
        <div class="tab-group">
            <button class="tab-btn active" id="loginTab">Login</button>
            <button class="tab-btn" id="registerTab">Register</button>
        </div>

        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email Address">
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="Password">
                <i class="fas fa-eye toggle-pass" onclick="togglePassword('loginPass', this)"></i>
            </div>
            <button class="main-btn" id="loginBtn">Login</button>
            <a class="forgot-link" id="forgotBtn">Forgot Password?</a>
        </div>

        <div id="registerForm" style="display: none;">
            <input type="text" id="regUser" placeholder="Full Name">
            <input type="email" id="regEmail" placeholder="Email Address">
            <input type="number" id="regWhatsapp" placeholder="WhatsApp Number">
            <input type="text" id="regCity" placeholder="City">
            
            <div class="input-group">
                <input type="password" id="regPass" placeholder="Create Password">
                <i class="fas fa-eye toggle-pass" onclick="togglePassword('regPass', this)"></i>
            </div>
            <div class="input-group">
                <input type="password" id="regConfirmPass" placeholder="Confirm Password">
                <i class="fas fa-eye toggle-pass" onclick="togglePassword('regConfirmPass', this)"></i>
            </div>
            
            <p id="refDisplay" style="font-size: 0.8rem; color: #fbbf24; margin: 10px 0; font-weight: bold; display: none;"></p>
            <button class="main-btn" id="regBtn">Create Account</button>
        </div>
    </div>

    <script>
        // --- PWA & Install Logic ---
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Banner ko tab dikhayen jab app installable ho
            installBanner.style.display = 'block';
        });

        installBanner.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { 
                    installBanner.style.display = 'none'; 
                }
                deferredPrompt = null;
            }
        });

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
            });
        }

        // Toggle Password Function
        window.togglePassword = (id, icon) => {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDea-7DWbKSc7QCbp2aP4OJuMiMvqnJxRA",
            authDomain: "metamint-127ee.firebaseapp.com",
            databaseURL: "https://metamint-127ee-default-rtdb.firebaseio.com",
            projectId: "metamint-127ee",
            storageBucket: "metamint-127ee.firebasestorage.app",
            messagingSenderId: "756801996954",
            appId: "1:756801996954:web:bcb7a18a57daacd3c6b723"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Referral System Logic
        const params = new URLSearchParams(window.location.search);
        const referrerID = params.get('ref');
        if (referrerID) {
            document.getElementById('refDisplay').innerText = "Invited By: #" + referrerID;
            document.getElementById('refDisplay').style.display = "block";
        }

        // Tab Switching Logic
        const lTab = document.getElementById('loginTab'), rTab = document.getElementById('registerTab');
        const lForm = document.getElementById('loginForm'), rForm = document.getElementById('registerForm');

        rTab.onclick = () => { rTab.classList.add('active'); lTab.classList.remove('active'); rForm.style.display='block'; lForm.style.display='none'; };
        lTab.onclick = () => { lTab.classList.add('active'); rTab.classList.remove('active'); lForm.style.display='block'; rForm.style.display='none'; };

        // Forgot Password Logic
        document.getElementById('forgotBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            if(!email) return Swal.fire('Email Required', 'Please enter your email first.', 'info');
            try {
                await sendPasswordResetEmail(auth, email);
                Swal.fire('Success', 'Password reset link sent to your email!', 'success');
            } catch (err) { Swal.fire('Error', 'User not found.', 'error'); }
        };

        // Registration Logic
        document.getElementById('regBtn').onclick = async () => {
            const name = document.getElementById('regUser').value, 
                  email = document.getElementById('regEmail').value, 
                  pass = document.getElementById('regPass').value,
                  cPass = document.getElementById('regConfirmPass').value;

            if(!name || !email || !pass || pass !== cPass) {
                return Swal.fire('Error', 'Please fill all fields correctly.', 'error');
            }
            
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const uidNum = Math.floor(1000 + Math.random() * 9000);
                
                await set(ref(db, 'users/' + res.user.uid), { 
                    username: name, 
                    email: email, 
                    uid: uidNum, 
                    referralCode: uidNum.toString(), 
                    referredBy: referrerID || "none", 
                    totalBalance: 0, 
                    withdrawable: 0, 
                    referralWallet: 0, 
                    role: 'user', 
                    miningStatus: 'inactive', 
                    timestamp: Date.now() 
                });
                
                Swal.fire('Success', 'Account Created!', 'success').then(() => {
                    window.location.href = 'dashboard.html';
                });
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
        };

        // Login Logic
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value, 
                  pass = document.getElementById('loginPass').value;
            if(!email || !pass) return Swal.fire('Error', 'Please fill all fields.', 'error');
            
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
                window.location.href = 'dashboard.html'; 
            } catch (err) { 
                Swal.fire('Error', 'Invalid login credentials.', 'error'); 
            }
        };
    </script>
</body>
</html>
